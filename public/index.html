<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/hexel/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍥 HEXEL STUDIO · 60° Grid</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #14141c;
            --bg-panel-hover: #1e1e2a;
            --border: #2a2a38;
            --text: #e2e2ea;
            --text-dim: #8a8a9a;
            --accent: #b388ff;
            --accent-dim: #7a5ac0;
            --accent-bg: #2a1f3a;

            --vertex: #ffaa66;
            --edge: #4ecdc4;
            --face: #96ceb4;

            --header-height: 60px;
            --toolbar-width: 240px;
            --status-height: 40px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            touch-action: none;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== CANVAS ===== */
        #main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
            display: block;
            cursor: crosshair;
        }

        /* ===== TOOL PALETTE (LEFT) ===== */
        #tool-palette {
            position: fixed;
            top: 20px;
            left: 20px;
            width: var(--toolbar-width);
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px;
            z-index: 1000;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.4);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .tool-group {
            margin-bottom: 24px;
        }

        .group-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .tool-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            margin-bottom: 4px;
            font-family: 'Inter', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s ease;
            border-radius: 2px;
        }

        .tool-btn:hover {
            background: var(--bg-panel-hover);
            border-color: var(--accent-dim);
            transform: translateX(4px);
        }

        .tool-btn.active {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tool-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* ===== PROPERTY PANEL (RIGHT) ===== */
        #property-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0;
            z-index: 1000;
            box-shadow: -8px 8px 0 rgba(0, 0, 0, 0.4);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .panel-header .tool-icon {
            font-size: 20px;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            border-radius: 2px;
        }

        .close-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        .panel-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .panel-section h4 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .tool-description {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .setting-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .setting-row label {
            width: 60px;
            color: var(--text-dim);
        }

        .setting-row input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            -webkit-appearance: none;
        }

        .setting-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 2px solid white;
            border-radius: 2px;
            cursor: pointer;
        }

        .setting-row input[type="color"] {
            width: 40px;
            height: 30px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
        }

        .setting-row .value {
            min-width: 40px;
            text-align: right;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .setting-row.readonly {
            justify-content: space-between;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 8px;
            text-align: center;
            border-radius: 2px;
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-dim);
            display: block;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .chip-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .chip-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .chip-value {
            color: var(--accent);
        }

        /* ===== STATUS BAR (BOTTOM) ===== */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--status-height);
            background: rgba(20, 20, 28, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 24px;
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            font-size: 14px;
        }

        .status-label {
            color: var(--text-dim);
        }

        .status-value {
            color: var(--accent);
            font-weight: 600;
        }

        .counts {
            display: flex;
            gap: 12px;
        }

        .counts .status-label {
            margin-left: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #tool-palette {
                width: 200px;
                padding: 12px;
            }

            .tool-btn span:not(.tool-icon) {
                display: none;
            }

            #property-panel {
                width: 240px;
            }

            #status-bar {
                font-size: 10px;
                gap: 12px;
                padding: 0 12px;
                overflow-x: auto;
            }
        }

        @media (max-width: 480px) {
            #tool-palette {
                left: 10px;
                top: 10px;
                width: 50px;
                padding: 8px;
            }

            .tool-btn {
                padding: 8px;
                justify-content: center;
            }

            .tool-btn span:not(.tool-icon) {
                display: none;
            }

            .group-label {
                display: none;
            }

            #property-panel {
                display: none; /* Hide on very small screens */
            }
        }

        /* ===== UTILS ===== */
        .hidden {
            display: none !important;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-dim);
        }
    </style>
</head>
<body>
    <canvas id="main-canvas"></canvas>

    <!-- UI JavaScript here -->
    <script>
        console.log('✅ HTML loaded');
        window.onerror = function(msg, url, line) {
            alert('JS Error: ' + msg + ' at line ' + line);
        };
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
