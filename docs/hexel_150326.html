<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEXELATION · GRID PREFERENCE · PAINT TOOLS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            cursor: grab;
        }
        canvas.painting {
            cursor: crosshair;
        }
        canvas.dragging {
            cursor: grabbing;
        }
        
        /* Main control panel - no rounding, webkit auto */
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            padding: 16px 20px;
            border: 1px solid #c4b5fd40;
            color: #e0e0ff;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            min-width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 100;
        }
        
        .panel-title {
            color: #c4b5fd;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            border-bottom: 1px solid #c4b5fd30;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px 16px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            color: #ffd966;
            font-size: 15px;
            font-weight: 500;
            font-family: monospace;
        }
        
        .lod-section {
            border-top: 1px solid #c4b5fd30;
            padding-top: 12px;
            margin-top: 8px;
        }
        
        .lod-bar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 8px 0;
        }
        
        .lod-level {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .lod-indicator {
            width: 8px;
            height: 8px;
            background: #333;
        }
        
        .lod-active {
            background: #6f6;
            box-shadow: 0 0 8px #6f6;
        }
        
        .lod-range {
            margin-left: auto;
            color: #888;
            font-family: monospace;
            font-size: 11px;
        }
        
        /* Tool panel - no rounding */
        .tool-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c4b5fd40;
            padding: 12px 20px;
            display: flex;
            gap: 24px;
            align-items: center;
            z-index: 100;
        }
        
        .tool-btn {
            background: transparent;
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 8px 16px;
            font-size: 13px;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .tool-btn:hover {
            background: #c4b5fd20;
            border-color: #c4b5fd;
        }
        
        .tool-btn.active {
            background: #c4b5fd;
            color: #0a0a0a;
            border-color: #c4b5fd;
        }
        
        .color-picker {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .color-swatch {
            width: 30px;
            height: 30px;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .color-swatch.active {
            border-color: white;
        }
        
        .brush-size {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brush-size input {
            width: 80px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #c4b5fd40;
            color: white;
            padding: 6px 8px;
            font-family: monospace;
            font-size: 13px;
        }
        
        .coord-display {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            z-index: 100;
        }
        
        /* Remove all rounding */
        button, input, .tool-btn, .color-swatch, #panel, .tool-panel, .coord-display {
            border-radius: 0;
        }
    </style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>
    
    <!-- Main info panel -->
    <div id="panel">
        <div class="panel-title">
            <span>⚡ HEXELATION · GRID PREFERENCE</span>
            <span id="fps">60</span>
        </div>
        
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">Camera</span>
                <span class="stat-value" id="camera-pos">0, 0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Zoom</span>
                <span class="stat-value" id="zoom-level">1.00x</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Cell Size</span>
                <span class="stat-value" id="cell-size">48px</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Visible</span>
                <span class="stat-value" id="visible-range">0x0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Hexel</span>
                <span class="stat-value" id="current-hexel">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Brush</span>
                <span class="stat-value" id="brush-info">● 8px</span>
            </div>
        </div>
        
        <div class="lod-section">
            <div style="margin-bottom: 8px; color: #aaa;">Grid Preference (diagonals > horizontals)</div>
            <div class="lod-bar">
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-snap"></span>
                    <span>Snap only</span>
                    <span class="lod-range">&lt;8px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-dots-sparse"></span>
                    <span>Sparse dots</span>
                    <span class="lod-range">8-15px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-dots"></span>
                    <span>Full dots</span>
                    <span class="lod-range">15-25px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-diags"></span>
                    <span>Diagonals</span>
                    <span class="lod-range">25-40px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-horiz"></span>
                    <span>Horizontals</span>
                    <span class="lod-range">40px+</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Paint tools panel -->
    <div class="tool-panel">
        <div class="tool-group">
            <button class="tool-btn" id="tool-pan" title="Pan (Space)">✥ Pan</button>
            <button class="tool-btn active" id="tool-paint" title="Paint (P)">● Paint</button>
            <button class="tool-btn" id="tool-erase" title="Erase (E)">⌫ Erase</button>
        </div>
        
        <div class="color-picker">
            <div class="color-swatch" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
            <div class="color-swatch" style="background: #4ecdc4;" data-color="#4ecdc4"></div>
            <div class="color-swatch" style="background: #ffe66d;" data-color="#ffe66d"></div>
            <div class="color-swatch active" style="background: #c4b5fd;" data-color="#c4b5fd"></div>
            <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
        </div>
        
        <div class="brush-size">
            <span>⚫</span>
            <input type="range" id="brush-size" min="2" max="32" value="8" step="1">
            <span id="brush-value">8px</span>
        </div>
        
        <button class="tool-btn" id="clear-btn">Clear</button>
    </div>
    
    <div class="coord-display" id="coords">0.00 , 0.00</div>

    <script>
        (function() {
            const canvas = document.getElementById('gridCanvas');
            const ctx = canvas.getContext('2d');
            
            // ================================================
            // HEXELATION PARAMETERS
            // ================================================
            const BASE_SIZE = 24;
            const H_STEP = BASE_SIZE * 2;
            const V_STEP = BASE_SIZE * Math.sqrt(3);
            
            // Camera
            let cameraWorldX = 0;
            let cameraWorldY = 0;
            let scale = 1.0;
            
            // Interaction
            let isDragging = false;
            let isPainting = false;
            let currentTool = 'paint'; // 'pan', 'paint', 'erase'
            let lastX = 0, lastY = 0;
            
            // Paint state
            let currentColor = '#c4b5fd';
            let brushSize = 8;
            let paintPoints = []; // Stores {x, y, color, size}
            
            // Colors
            const COLORS = {
                diagonal: '#9f8be5',
                dots: '#b4a5ee',
                dotsSparse: '#a094d0',
                origin: '#ffffff'
            };
            
            // ================================================
            // PROGRESSIVE LOD WITH GRID PREFERENCE
            // ================================================
            // Priority: Diagonals > Horizontals
            // This means diagonals appear EARLIER than horizontals
            
            const LOD = {
                SNAP_ONLY: 8,      // <8px: nothing
                SPARSE_DOTS: 15,    // 8-15px: 30-70% dots
                FULL_DOTS: 25,      // 15-25px: all dots
                DIAGONALS: 40,      // 25-40px: + diagonals
                // >40px: everything (diagonals + horizontals)
            };
            
            function getCellSizePx() {
                return H_STEP * scale;
            }
            
            function getLODInfo() {
                const cellSize = getCellSizePx();
                
                return {
                    snapOnly: cellSize < LOD.SNAP_ONLY,
                    sparseDots: cellSize >= LOD.SNAP_ONLY && cellSize < LOD.SPARSE_DOTS,
                    fullDots: cellSize >= LOD.SPARSE_DOTS && cellSize < LOD.FULL_DOTS,
                    diagonals: cellSize >= LOD.FULL_DOTS && cellSize < LOD.DIAGONALS,
                    horizontals: cellSize >= LOD.DIAGONALS,
                    
                    dotDensity: cellSize < LOD.SPARSE_DOTS ? 
                        (cellSize - LOD.SNAP_ONLY) / (LOD.SPARSE_DOTS - LOD.SNAP_ONLY) : 1.0
                };
            }
            
            // ================================================
            // COORDINATE CONVERSIONS
            // ================================================
            function worldToScreen(worldX, worldY) {
                return {
                    x: canvas.width / 2 + (worldX - cameraWorldX) * scale,
                    y: canvas.height / 2 + (worldY - cameraWorldY) * scale
                };
            }
            
            function screenToWorld(screenX, screenY) {
                return {
                    x: cameraWorldX + (screenX - canvas.width / 2) / scale,
                    y: cameraWorldY + (screenY - canvas.height / 2) / scale
                };
            }
            
            // Get hexel (triangle) at world position
            function getHexelAt(worldX, worldY) {
                const col = Math.floor(worldX / H_STEP);
                const row = Math.floor(worldY / V_STEP);
                const inOddRow = (row % 2 !== 0);
                
                const localX = (worldX - col * H_STEP) / H_STEP;
                const localY = (worldY - row * V_STEP) / V_STEP;
                
                let triangle = 0;
                if (inOddRow) {
                    if (localY < 0.5) {
                        triangle = localX < 0.5 ? 0 : 1;
                    } else {
                        triangle = localX < 0.5 ? 5 : 4;
                    }
                } else {
                    if (localY < 0.5) {
                        triangle = localX < 0.5 ? 2 : 3;
                    } else {
                        triangle = localX < 0.5 ? 1 : 0;
                    }
                }
                
                return { col, row, triangle, inOddRow };
            }
            
            // ================================================
            // PAINTING
            // ================================================
            function paintAt(screenX, screenY) {
                const world = screenToWorld(screenX, screenY);
                
                paintPoints.push({
                    x: world.x,
                    y: world.y,
                    color: currentColor,
                    size: brushSize / scale, // World size brush
                    timestamp: Date.now()
                });
                
                // Limit points for performance (optional)
                if (paintPoints.length > 1000) {
                    paintPoints = paintPoints.slice(-800);
                }
                
                draw();
            }
            
            function clearPaint() {
                paintPoints = [];
                draw();
            }
            
            // ================================================
            // RENDERING
            // ================================================
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const cellSize = getCellSizePx();
                const lod = getLODInfo();
                const centerScreenX = canvas.width / 2;
                const centerScreenY = canvas.height / 2;
                
                // Visible world bounds
                const worldLeft = cameraWorldX - (canvas.width / 2) / scale;
                const worldRight = cameraWorldX + (canvas.width / 2) / scale;
                const worldTop = cameraWorldY - (canvas.height / 2) / scale;
                const worldBottom = cameraWorldY + (canvas.height / 2) / scale;
                
                const minCol = Math.floor(worldLeft / H_STEP) - 4;
                const maxCol = Math.ceil(worldRight / H_STEP) + 4;
                const minRow = Math.floor(worldTop / V_STEP) - 4;
                const maxRow = Math.ceil(worldBottom / V_STEP) + 4;
                
                // Update UI
                document.getElementById('camera-pos').innerHTML = 
                    `${cameraWorldX.toFixed(1)}, ${cameraWorldY.toFixed(1)}`;
                document.getElementById('zoom-level').innerHTML = scale.toFixed(2) + 'x';
                document.getElementById('cell-size').innerHTML = Math.round(cellSize) + 'px';
                document.getElementById('visible-range').innerHTML = 
                    `${maxRow - minRow} × ${maxCol - minCol}`;
                
                // Update LOD indicators
                const indicators = {
                    'lod-snap': lod.snapOnly,
                    'lod-dots-sparse': lod.sparseDots,
                    'lod-dots': lod.fullDots || lod.diagonals || lod.horizontals,
                    'lod-diags': lod.diagonals || lod.horizontals,
                    'lod-horiz': lod.horizontals
                };
                
                for (const [id, active] of Object.entries(indicators)) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.className = 'lod-indicator ' + (active ? 'lod-active' : 'lod-inactive');
                    }
                }
                
                // ========== PAINT LAYER (always rendered) ==========
                for (const point of paintPoints) {
                    const screen = worldToScreen(point.x, point.y);
                    
                    // Skip if far outside view
                    if (screen.x < -100 || screen.x > canvas.width + 100 ||
                        screen.y < -100 || screen.y > canvas.height + 100) {
                        continue;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(screen.x, screen.y, point.size * scale, 0, Math.PI * 2);
                    ctx.fillStyle = point.color;
                    ctx.globalAlpha = 0.6;
                    ctx.fill();
                    
                    // Border
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.3;
                    ctx.stroke();
                }
                
                // ========== GRID LAYER (with preference) ==========
                ctx.globalAlpha = 1.0;
                ctx.lineWidth = Math.max(0.5, Math.min(2.0, 1.5 / Math.sqrt(scale)));
                
                // DIAGONALS (appear before horizontals)
                if (lod.diagonals || lod.horizontals) {
                    ctx.strokeStyle = COLORS.diagonal;
                    ctx.globalAlpha = 0.2;
                    
                    // +60° diagonals
                    ctx.beginPath();
                    for (let row = minRow - 2; row <= maxRow + 2; row++) {
                        for (let col = minCol - 2; col <= maxCol + 2; col++) {
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerScreenX + (worldX - cameraWorldX) * scale;
                            const screenY = centerScreenY + (worldY - cameraWorldY) * scale;
                            
                            const xOffset = (row % 2 === 0) ? 0 : (H_STEP * scale) / 2;
                            
                            const extend = Math.max(canvas.width, canvas.height) * 1.5;
                            ctx.moveTo(screenX + xOffset - extend, screenY - extend * 1.732);
                            ctx.lineTo(screenX + xOffset + extend, screenY + extend * 1.732);
                        }
                    }
                    ctx.stroke();
                    
                    // -60° diagonals
                    ctx.beginPath();
                    for (let row = minRow - 2; row <= maxRow + 2; row++) {
                        for (let col = minCol - 2; col <= maxCol + 2; col++) {
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerScreenX + (worldX - cameraWorldX) * scale;
                            const screenY = centerScreenY + (worldY - cameraWorldY) * scale;
                            
                            const xOffset = (row % 2 === 0) ? 0 : (H_STEP * scale) / 2;
                            
                            const extend = Math.max(canvas.width, canvas.height) * 1.5;
                            ctx.moveTo(screenX + xOffset - extend, screenY + extend * 1.732);
                            ctx.lineTo(screenX + xOffset + extend, screenY - extend * 1.732);
                        }
                    }
                    ctx.stroke();
                }
                
                // HORIZONTALS (only at highest zoom)
                if (lod.horizontals) {
                    ctx.strokeStyle = COLORS.diagonal;
                    ctx.globalAlpha = 0.15; // Even subtler
                    ctx.beginPath();
                    
                    for (let row = minRow; row <= maxRow; row++) {
                        const worldY = row * V_STEP;
                        const screenY = centerScreenY + (worldY - cameraWorldY) * scale;
                        
                        if (screenY >= -100 && screenY <= canvas.height + 100) {
                            ctx.moveTo(0, screenY);
                            ctx.lineTo(canvas.width, screenY);
                        }
                    }
                    ctx.stroke();
                }
                
                // DOTS (progressive)
                if (!lod.snapOnly) {
                    if (lod.sparseDots) {
                        ctx.fillStyle = COLORS.dotsSparse;
                        ctx.globalAlpha = 0.2 * lod.dotDensity;
                    } else {
                        ctx.fillStyle = COLORS.dots;
                        ctx.globalAlpha = 0.25;
                    }
                    
                    for (let row = minRow; row <= maxRow; row++) {
                        for (let col = minCol; col <= maxCol; col++) {
                            if (lod.sparseDots) {
                                const hash = (col * 31 + row * 71) % 100 / 100;
                                if (hash > lod.dotDensity) continue;
                            }
                            
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerScreenX + (worldX - cameraWorldX) * scale;
                            const screenY = centerScreenY + (worldY - cameraWorldY) * scale;
                            
                            const dotSize = lod.sparseDots ? 1.0 : 1.5;
                            
                            if (row % 2 === 0) {
                                ctx.beginPath();
                                ctx.arc(screenX, screenY, dotSize, 0, Math.PI * 2);
                                ctx.fill();
                            } else {
                                ctx.beginPath();
                                ctx.arc(screenX + (H_STEP * scale)/2, screenY, dotSize, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                }
                
                // ORIGIN MARKER
                const originScreen = worldToScreen(0, 0);
                if (originScreen.x >= -50 && originScreen.x <= canvas.width + 50 &&
                    originScreen.y >= -50 && originScreen.y <= canvas.height + 50) {
                    
                    ctx.fillStyle = COLORS.origin;
                    ctx.globalAlpha = 0.9;
                    
                    const originSize = Math.max(3, Math.min(8, 5 / Math.sqrt(scale)));
                    ctx.beginPath();
                    ctx.arc(originScreen.x, originScreen.y, originSize, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = COLORS.origin;
                    ctx.lineWidth = 1.2;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(originScreen.x - originSize * 2, originScreen.y);
                    ctx.lineTo(originScreen.x + originSize * 2, originScreen.y);
                    ctx.moveTo(originScreen.x, originScreen.y - originSize * 2);
                    ctx.lineTo(originScreen.x, originScreen.y + originSize * 2);
                    ctx.stroke();
                }
                
                // Update hexel under mouse (if in painting mode)
                if (currentTool !== 'pan') {
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = lastX; // Approximate
                    const mouseY = lastY;
                    
                    if (mouseX && mouseY) {
                        const world = screenToWorld(mouseX, mouseY);
                        const hexel = getHexelAt(world.x, world.y);
                        document.getElementById('current-hexel').innerHTML = 
                            `${hexel.col},${hexel.row}:${hexel.triangle}`;
                    }
                }
                
                ctx.globalAlpha = 1.0;
            }
            
            // ================================================
            // INTERACTION
            // ================================================
            function handleStart(e) {
                e.preventDefault();
                const clientX = e.clientX ?? e.touches[0].clientX;
                const clientY = e.clientY ?? e.touches[0].clientY;
                
                lastX = clientX;
                lastY = clientY;
                
                if (currentTool === 'pan') {
                    isDragging = true;
                    canvas.classList.add('dragging');
                } else {
                    isPainting = true;
                    canvas.classList.add('painting');
                    paintAt(clientX, clientY);
                }
            }
            
            function handleMove(e) {
                e.preventDefault();
                const clientX = e.clientX ?? e.touches[0].clientX;
                const clientY = e.clientY ?? e.touches[0].clientY;
                
                // Update coordinate display
                const world = screenToWorld(clientX, clientY);
                document.getElementById('coords').innerHTML = 
                    `${world.x.toFixed(2)} , ${world.y.toFixed(2)}`;
                
                if (isDragging) {
                    cameraWorldX -= (clientX - lastX) / scale;
                    cameraWorldY -= (clientY - lastY) / scale;
                    draw();
                } else if (isPainting && (currentTool === 'paint' || currentTool === 'erase')) {
                    paintAt(clientX, clientY);
                }
                
                lastX = clientX;
                lastY = clientY;
            }
            
            function handleEnd(e) {
                e.preventDefault();
                isDragging = false;
                isPainting = false;
                canvas.classList.remove('dragging', 'painting');
            }
            
            // Mouse wheel zoom
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const worldBefore = screenToWorld(mouseX, mouseY);
                
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= zoomFactor;
                scale = Math.max(0.03, Math.min(50, scale));
                
                const worldAfter = screenToWorld(mouseX, mouseY);
                
                cameraWorldX += worldBefore.x - worldAfter.x;
                cameraWorldY += worldBefore.y - worldAfter.y;
                
                draw();
            }, { passive: false });
            
            // Touch events
            canvas.addEventListener('touchstart', handleStart);
            canvas.addEventListener('touchmove', handleMove);
            canvas.addEventListener('touchend', handleEnd);
            canvas.addEventListener('touchcancel', handleEnd);
            
            // Mouse events
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            
            // ================================================
            // TOOL CONTROLS
            // ================================================
            document.getElementById('tool-pan').addEventListener('click', () => {
                currentTool = 'pan';
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-pan').classList.add('active');
            });
            
            document.getElementById('tool-paint').addEventListener('click', () => {
                currentTool = 'paint';
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-paint').classList.add('active');
            });
            
            document.getElementById('tool-erase').addEventListener('click', () => {
                currentTool = 'erase';
                currentColor = '#0a0a0a'; // Background color
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-erase').classList.add('active');
            });
            
            // Color picker
            document.querySelectorAll('.color-swatch').forEach(swatch => {
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    currentColor = swatch.dataset.color;
                    
                    if (currentTool === 'erase') {
                        currentTool = 'paint';
                        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                        document.getElementById('tool-paint').classList.add('active');
                    }
                });
            });
            
            // Brush size
            const brushInput = document.getElementById('brush-size');
            const brushValue = document.getElementById('brush-value');
            brushInput.addEventListener('input', () => {
                brushSize = parseInt(brushInput.value);
                brushValue.innerHTML = brushSize + 'px';
                document.getElementById('brush-info').innerHTML = `● ${brushSize}px`;
            });
            
            // Clear
            document.getElementById('clear-btn').addEventListener('click', clearPaint);
            
            // Keyboard shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    document.getElementById('tool-pan').click();
                } else if (e.key === 'p' || e.key === 'P') {
                    document.getElementById('tool-paint').click();
                } else if (e.key === 'e' || e.key === 'E') {
                    document.getElementById('tool-erase').click();
                } else if (e.key === 'r' || e.key === 'R') {
                    cameraWorldX = 0;
                    cameraWorldY = 0;
                    scale = 1.0;
                    draw();
                }
            });
            
            // Initialize
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                draw();
            });
            
            // FPS counter
            let frameCount = 0;
            let lastTime = performance.now();
            
            function updateFPS() {
                frameCount++;
                const now = performance.now();
                if (now - lastTime >= 1000) {
                    document.getElementById('fps').innerHTML = frameCount;
                    frameCount = 0;
                    lastTime = now;
                }
                requestAnimationFrame(updateFPS);
            }
            
            draw();
            updateFPS();
            
            // Expose for debugging
            window.hexelation = {
                worldToScreen,
                screenToWorld,
                getHexelAt,
                paintPoints,
                clearPaint
            };
        })();
    </script>
</body>
</html>
