<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEXELATION · CUMULATIVE PAINT · HIGH PERFORMANCE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        /* Canvas layers */
        #gridCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            z-index: 1;
            pointer-events: none;
        }
        
        #paintCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            cursor: crosshair;
            background: transparent;
            touch-action: none;
        }
        
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c4b5fd40;
            padding: 16px 20px;
            color: #e0e0ff;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            min-width: 340px;
            z-index: 100;
            pointer-events: none;
        }
        
        .panel-title {
            color: #c4b5fd;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            border-bottom: 1px solid #c4b5fd30;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #ffd966;
            font-size: 14px;
            font-family: monospace;
        }
        
        .lod-section {
            border-top: 1px solid #c4b5fd30;
            padding-top: 12px;
        }
        
        .lod-bar {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 8px 0;
        }
        
        .lod-level {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        
        .lod-indicator {
            width: 8px;
            height: 8px;
            background: #333;
        }
        
        .lod-active {
            background: #6f6;
            box-shadow: 0 0 8px #6f6;
        }
        
        .tool-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c4b5fd40;
            padding: 12px 20px;
            display: flex;
            gap: 24px;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }
        
        .tool-btn {
            background: transparent;
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .tool-btn:hover {
            background: #c4b5fd20;
        }
        
        .tool-btn.active {
            background: #c4b5fd;
            color: #0a0a0a;
        }
        
        .color-picker {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        
        .color-swatch {
            width: 30px;
            height: 30px;
            border: 2px solid transparent;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .color-swatch.active {
            border-color: white;
        }
        
        .brush-control {
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
        }
        
        .brush-control input {
            width: 100px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #c4b5fd40;
            color: white;
            padding: 6px;
            pointer-events: auto;
        }
        
        .coord-display {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
        }
        
        * {
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>
    <canvas id="paintCanvas"></canvas>
    
    <div id="panel">
        <div class="panel-title">
            <span>⚡ HEXELATION · CUMULATIVE PAINT</span>
            <span id="fps">60</span>
        </div>
        
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">Camera</span>
                <span class="stat-value" id="camera-pos">0,0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Zoom</span>
                <span class="stat-value" id="zoom-level">1.00x</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Cell</span>
                <span class="stat-value" id="cell-size">48px</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Strokes</span>
                <span class="stat-value" id="stroke-count">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Hexel</span>
                <span class="stat-value" id="current-hexel">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Color</span>
                <span class="stat-value" id="current-color">#c4b5fd</span>
            </div>
        </div>
        
        <div class="lod-section">
            <div style="margin-bottom: 8px; color: #aaa;">Grid Preference</div>
            <div class="lod-bar">
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-snap"></span>
                    <span>Snap only</span>
                    <span class="lod-range">&lt;8px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-dots-sparse"></span>
                    <span>Sparse dots</span>
                    <span class="lod-range">8-15px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-dots"></span>
                    <span>Full dots</span>
                    <span class="lod-range">15-25px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-diags"></span>
                    <span>Diagonals</span>
                    <span class="lod-range">25-40px</span>
                </div>
                <div class="lod-level">
                    <span class="lod-indicator" id="lod-horiz"></span>
                    <span>Horizontals</span>
                    <span class="lod-range">40px+</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="tool-panel">
        <div class="tool-group">
            <button class="tool-btn" id="tool-pan">✥ Pan</button>
            <button class="tool-btn active" id="tool-paint">● Paint</button>
            <button class="tool-btn" id="tool-erase">⌫ Erase</button>
        </div>
        
        <div class="color-picker">
            <div class="color-swatch" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
            <div class="color-swatch" style="background: #4ecdc4;" data-color="#4ecdc4"></div>
            <div class="color-swatch" style="background: #ffe66d;" data-color="#ffe66d"></div>
            <div class="color-swatch active" style="background: #c4b5fd;" data-color="#c4b5fd"></div>
            <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
        </div>
        
        <div class="brush-control">
            <span>⚫</span>
            <input type="range" id="brush-size" min="2" max="50" value="12" step="1">
            <span id="brush-value">12px</span>
        </div>
        
        <div class="brush-control">
            <span>🎛️</span>
            <input type="range" id="snap-strength" min="0" max="1" value="0.7" step="0.05">
            <span id="snap-value">0.70</span>
        </div>
        
        <button class="tool-btn" id="clear-btn">Clear</button>
    </div>
    
    <div class="coord-display" id="coords">0.00 , 0.00</div>

    <script>
        (function() {
            // Canvas setup
            const gridCanvas = document.getElementById('gridCanvas');
            const paintCanvas = document.getElementById('paintCanvas');
            
            const gridCtx = gridCanvas.getContext('2d');
            const paintCtx = paintCanvas.getContext('2d');
            
            // ================================================
            // CORE PARAMETERS
            // ================================================
            const BASE_SIZE = 24;
            const H_STEP = BASE_SIZE * 2;
            const V_STEP = BASE_SIZE * Math.sqrt(3);
            
            // Camera
            let cameraWorldX = 0;
            let cameraWorldY = 0;
            let scale = 1.0;
            
            // Interaction
            let isDragging = false;
            let isPainting = false;
            let currentTool = 'paint';
            let lastX = 0, lastY = 0;
            let lastPoint = null;
            
            // Paint state
            let currentColor = '#c4b5fd';
            let brushSize = 12;
            let snapStrength = 0.7;
            let strokes = []; // Store strokes as arrays of points
            let currentStroke = null;
            
            const BG_COLOR = '#0a0a0a';
            
            // Grid colors
            const COLORS = {
                horizontal: '#c4b5fd',
                diagonal: '#9f8be5',
                dots: '#b4a5ee',
                dotsSparse: '#a094d0',
                origin: '#ffffff'
            };
            
            // ================================================
            // GRID FUNCTIONS
            // ================================================
            function getNearestVertex(worldX, worldY) {
                const col = Math.round(worldX / H_STEP);
                const row = Math.round(worldY / V_STEP);
                
                let vertexX = col * H_STEP;
                let vertexY = row * V_STEP;
                
                if (row % 2 !== 0) {
                    vertexX += H_STEP / 2;
                }
                
                return { x: vertexX, y: vertexY, col, row };
            }
            
            function applyGridInfluence(point, strength) {
                if (strength === 0) return point;
                
                const nearest = getNearestVertex(point.x, point.y);
                
                return {
                    x: point.x * (1 - strength) + nearest.x * strength,
                    y: point.y * (1 - strength) + nearest.y * strength
                };
            }
            
            // ================================================
            // PAINTING - CUMULATIVE APPROACH
            // ================================================
            function startStroke(screenX, screenY) {
                const world = screenToWorld(screenX, screenY);
                
                let colorToUse;
                if (currentTool === 'erase') {
                    colorToUse = BG_COLOR;
                } else {
                    colorToUse = currentColor;
                }
                
                currentStroke = {
                    points: [{
                        x: world.x,
                        y: world.y,
                        size: brushSize / scale,
                        color: colorToUse
                    }],
                    color: colorToUse,
                    size: brushSize / scale
                };
                
                // Draw immediately
                drawPoint(world.x, world.y, colorToUse, brushSize / scale);
            }
            
            function continueStroke(screenX, screenY) {
                if (!currentStroke) return;
                
                const world = screenToWorld(screenX, screenY);
                const lastWorld = currentStroke.points[currentStroke.points.length - 1];
                
                // Calculate distance and interpolate
                const dist = Math.hypot(world.x - lastWorld.x, world.y - lastWorld.y);
                const steps = Math.max(1, Math.floor(dist / (brushSize / scale) * 2));
                
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const interpX = lastWorld.x * (1 - t) + world.x * t;
                    const interpY = lastWorld.y * (1 - t) + world.y * t;
                    
                    // Apply grid influence
                    let point = { x: interpX, y: interpY };
                    point = applyGridInfluence(point, snapStrength);
                    
                    currentStroke.points.push({
                        x: point.x,
                        y: point.y,
                        size: currentStroke.size,
                        color: currentStroke.color
                    });
                    
                    // Draw directly to canvas
                    drawPoint(point.x, point.y, currentStroke.color, currentStroke.size);
                }
            }
            
            function endStroke() {
                if (currentStroke && currentStroke.points.length > 0) {
                    strokes.push(currentStroke);
                    document.getElementById('stroke-count').innerHTML = strokes.length;
                }
                currentStroke = null;
            }
            
            // Direct drawing to paint canvas (no redraw of everything)
            function drawPoint(worldX, worldY, color, size) {
                const screen = worldToScreen(worldX, worldY);
                const screenRadius = Math.max(2, size * scale);
                
                paintCtx.beginPath();
                paintCtx.arc(screen.x, screen.y, screenRadius, 0, Math.PI * 2);
                paintCtx.fillStyle = color;
                paintCtx.globalAlpha = 0.9;
                paintCtx.fill();
                
                // Subtle highlight
                paintCtx.beginPath();
                paintCtx.arc(screen.x - 1, screen.y - 1, screenRadius * 0.3, 0, Math.PI * 2);
                paintCtx.fillStyle = 'rgba(255,255,255,0.3)';
                paintCtx.fill();
            }
            
            // Redraw all strokes (used after zoom/pan)
            function redrawAllStrokes() {
                // Clear paint canvas
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                
                // Redraw all strokes
                for (const stroke of strokes) {
                    for (const point of stroke.points) {
                        drawPoint(point.x, point.y, point.color, point.size);
                    }
                }
            }
            
            // ================================================
            // COORDINATE CONVERSIONS
            // ================================================
            function worldToScreen(worldX, worldY) {
                return {
                    x: gridCanvas.width / 2 + (worldX - cameraWorldX) * scale,
                    y: gridCanvas.height / 2 + (worldY - cameraWorldY) * scale
                };
            }
            
            function screenToWorld(screenX, screenY) {
                return {
                    x: cameraWorldX + (screenX - gridCanvas.width / 2) / scale,
                    y: cameraWorldY + (screenY - gridCanvas.height / 2) / scale
                };
            }
            
            function getHexelAt(worldX, worldY) {
                const col = Math.floor(worldX / H_STEP);
                const row = Math.floor(worldY / V_STEP);
                const inOddRow = (row % 2 !== 0);
                
                const localX = (worldX - col * H_STEP) / H_STEP;
                const localY = (worldY - row * V_STEP) / V_STEP;
                
                let triangle = 0;
                if (inOddRow) {
                    if (localY < 0.5) {
                        triangle = localX < 0.5 ? 0 : 1;
                    } else {
                        triangle = localX < 0.5 ? 5 : 4;
                    }
                } else {
                    if (localY < 0.5) {
                        triangle = localX < 0.5 ? 2 : 3;
                    } else {
                        triangle = localX < 0.5 ? 1 : 0;
                    }
                }
                
                return { col, row, triangle, inOddRow };
            }
            
            // ================================================
            // LOD
            // ================================================
            function getCellSizePx() {
                return H_STEP * scale;
            }
            
            function getLODInfo() {
                const cellSize = getCellSizePx();
                
                return {
                    snapOnly: cellSize < 8,
                    sparseDots: cellSize >= 8 && cellSize < 15,
                    fullDots: cellSize >= 15 && cellSize < 25,
                    diagonals: cellSize >= 25 && cellSize < 40,
                    horizontals: cellSize >= 40
                };
            }
            
            // ================================================
            // GRID RENDERING
            // ================================================
            function drawGrid() {
                gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
                
                const cellSize = getCellSizePx();
                const lod = getLODInfo();
                const centerX = gridCanvas.width / 2;
                const centerY = gridCanvas.height / 2;
                
                // Visible world bounds
                const worldLeft = cameraWorldX - (gridCanvas.width / 2) / scale;
                const worldRight = cameraWorldX + (gridCanvas.width / 2) / scale;
                const worldTop = cameraWorldY - (gridCanvas.height / 2) / scale;
                const worldBottom = cameraWorldY + (gridCanvas.height / 2) / scale;
                
                const minCol = Math.floor(worldLeft / H_STEP) - 4;
                const maxCol = Math.ceil(worldRight / H_STEP) + 4;
                const minRow = Math.floor(worldTop / V_STEP) - 4;
                const maxRow = Math.ceil(worldBottom / V_STEP) + 4;
                
                // Update UI
                document.getElementById('camera-pos').innerHTML = 
                    `${cameraWorldX.toFixed(1)},${cameraWorldY.toFixed(1)}`;
                document.getElementById('zoom-level').innerHTML = scale.toFixed(2) + 'x';
                document.getElementById('cell-size').innerHTML = Math.round(cellSize) + 'px';
                document.getElementById('current-color').innerHTML = currentColor;
                
                // Update LOD indicators
                const indicators = {
                    'lod-snap': lod.snapOnly,
                    'lod-dots-sparse': lod.sparseDots,
                    'lod-dots': lod.fullDots || lod.diagonals || lod.horizontals,
                    'lod-diags': lod.diagonals || lod.horizontals,
                    'lod-horiz': lod.horizontals
                };
                
                for (const [id, active] of Object.entries(indicators)) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.className = 'lod-indicator ' + (active ? 'lod-active' : 'lod-inactive');
                    }
                }
                
                // ========== DRAW GRID ==========
                gridCtx.lineWidth = Math.max(0.5, Math.min(2.0, 1.5 / Math.sqrt(scale)));
                
                // HORIZONTALS
                if (lod.horizontals) {
                    gridCtx.strokeStyle = COLORS.horizontal;
                    gridCtx.globalAlpha = 0.2;
                    gridCtx.beginPath();
                    
                    for (let row = minRow; row <= maxRow; row++) {
                        const worldY = row * V_STEP;
                        const screenY = centerY + (worldY - cameraWorldY) * scale;
                        
                        if (screenY >= -100 && screenY <= gridCanvas.height + 100) {
                            gridCtx.moveTo(0, screenY);
                            gridCtx.lineTo(gridCanvas.width, screenY);
                        }
                    }
                    gridCtx.stroke();
                }
                
                // DIAGONALS
                if (lod.diagonals || lod.horizontals) {
                    gridCtx.strokeStyle = COLORS.diagonal;
                    gridCtx.globalAlpha = 0.2;
                    
                    // +60° diagonals
                    gridCtx.beginPath();
                    for (let row = minRow - 2; row <= maxRow + 2; row++) {
                        for (let col = minCol - 2; col <= maxCol + 2; col++) {
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerX + (worldX - cameraWorldX) * scale;
                            const screenY = centerY + (worldY - cameraWorldY) * scale;
                            
                            const xOffset = (row % 2 === 0) ? 0 : (H_STEP * scale) / 2;
                            
                            const extend = Math.max(gridCanvas.width, gridCanvas.height) * 1.5;
                            gridCtx.moveTo(screenX + xOffset - extend, screenY - extend * 1.732);
                            gridCtx.lineTo(screenX + xOffset + extend, screenY + extend * 1.732);
                        }
                    }
                    gridCtx.stroke();
                    
                    // -60° diagonals
                    gridCtx.beginPath();
                    for (let row = minRow - 2; row <= maxRow + 2; row++) {
                        for (let col = minCol - 2; col <= maxCol + 2; col++) {
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerX + (worldX - cameraWorldX) * scale;
                            const screenY = centerY + (worldY - cameraWorldY) * scale;
                            
                            const xOffset = (row % 2 === 0) ? 0 : (H_STEP * scale) / 2;
                            
                            const extend = Math.max(gridCanvas.width, gridCanvas.height) * 1.5;
                            gridCtx.moveTo(screenX + xOffset - extend, screenY + extend * 1.732);
                            gridCtx.lineTo(screenX + xOffset + extend, screenY - extend * 1.732);
                        }
                    }
                    gridCtx.stroke();
                }
                
                // DOTS
                if (!lod.snapOnly) {
                    if (lod.sparseDots) {
                        gridCtx.fillStyle = COLORS.dotsSparse;
                        gridCtx.globalAlpha = 0.2 * ((cellSize - 8) / 7);
                    } else {
                        gridCtx.fillStyle = COLORS.dots;
                        gridCtx.globalAlpha = 0.2;
                    }
                    
                    for (let row = minRow; row <= maxRow; row++) {
                        for (let col = minCol; col <= maxCol; col++) {
                            if (lod.sparseDots) {
                                const hash = (col * 31 + row * 71) % 100 / 100;
                                if (hash > ((cellSize - 8) / 7)) continue;
                            }
                            
                            const worldX = col * H_STEP;
                            const worldY = row * V_STEP;
                            
                            const screenX = centerX + (worldX - cameraWorldX) * scale;
                            const screenY = centerY + (worldY - cameraWorldY) * scale;
                            
                            const dotSize = lod.sparseDots ? 1.0 : 1.5;
                            
                            if (row % 2 === 0) {
                                gridCtx.beginPath();
                                gridCtx.arc(screenX, screenY, dotSize, 0, Math.PI * 2);
                                gridCtx.fill();
                            } else {
                                gridCtx.beginPath();
                                gridCtx.arc(screenX + (H_STEP * scale)/2, screenY, dotSize, 0, Math.PI * 2);
                                gridCtx.fill();
                            }
                        }
                    }
                }
                
                // ORIGIN MARKER
                const originScreen = worldToScreen(0, 0);
                if (originScreen.x >= -50 && originScreen.x <= gridCanvas.width + 50 &&
                    originScreen.y >= -50 && originScreen.y <= gridCanvas.height + 50) {
                    
                    gridCtx.fillStyle = COLORS.origin;
                    gridCtx.globalAlpha = 0.5;
                    
                    const originSize = Math.max(3, Math.min(8, 5 / Math.sqrt(scale)));
                    gridCtx.beginPath();
                    gridCtx.arc(originScreen.x, originScreen.y, originSize, 0, Math.PI * 2);
                    gridCtx.fill();
                }
                
                gridCtx.globalAlpha = 1.0;
            }
            
            // ================================================
            // INTERACTION
            // ================================================
            function handleStart(e) {
                e.preventDefault();
                
                let clientX, clientY;
                
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                lastX = clientX;
                lastY = clientY;
                
                if (currentTool === 'pan') {
                    isDragging = true;
                    paintCanvas.style.cursor = 'grabbing';
                } else {
                    isPainting = true;
                    paintCanvas.style.cursor = 'crosshair';
                    startStroke(clientX, clientY);
                }
            }
            
            function handleMove(e) {
                e.preventDefault();
                
                let clientX, clientY;
                
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                const world = screenToWorld(clientX, clientY);
                document.getElementById('coords').innerHTML = 
                    `${world.x.toFixed(2)} , ${world.y.toFixed(2)}`;
                
                // Update hexel under mouse
                const hexel = getHexelAt(world.x, world.y);
                document.getElementById('current-hexel').innerHTML = 
                    `${hexel.col},${hexel.row}:${hexel.triangle}`;
                
                if (isDragging) {
                    cameraWorldX -= (clientX - lastX) / scale;
                    cameraWorldY -= (clientY - lastY) / scale;
                    drawGrid();
                    redrawAllStrokes(); // Need full redraw after camera move
                } else if (isPainting) {
                    continueStroke(clientX, clientY);
                }
                
                lastX = clientX;
                lastY = clientY;
            }
            
            function handleEnd(e) {
                e.preventDefault();
                
                if (isPainting) {
                    endStroke();
                }
                
                isDragging = false;
                isPainting = false;
                paintCanvas.style.cursor = 'crosshair';
            }
            
            // Mouse wheel zoom
            paintCanvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                const rect = paintCanvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const worldBefore = screenToWorld(mouseX, mouseY);
                
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= zoomFactor;
                scale = Math.max(0.05, Math.min(30, scale));
                
                const worldAfter = screenToWorld(mouseX, mouseY);
                
                cameraWorldX += worldBefore.x - worldAfter.x;
                cameraWorldY += worldBefore.y - worldAfter.y;
                
                drawGrid();
                redrawAllStrokes(); // Need full redraw after zoom
            }, { passive: false });
            
            // Event listeners on paint canvas only
            paintCanvas.addEventListener('mousedown', handleStart);
            paintCanvas.addEventListener('mousemove', handleMove);
            paintCanvas.addEventListener('mouseup', handleEnd);
            paintCanvas.addEventListener('mouseleave', handleEnd);
            
            paintCanvas.addEventListener('touchstart', handleStart);
            paintCanvas.addEventListener('touchmove', handleMove);
            paintCanvas.addEventListener('touchend', handleEnd);
            paintCanvas.addEventListener('touchcancel', handleEnd);
            
            // ================================================
            // TOOL CONTROLS
            // ================================================
            document.getElementById('tool-pan').addEventListener('click', () => {
                currentTool = 'pan';
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-pan').classList.add('active');
                paintCanvas.style.cursor = 'grab';
            });
            
            document.getElementById('tool-paint').addEventListener('click', () => {
                currentTool = 'paint';
                const activeSwatch = document.querySelector('.color-swatch.active');
                if (activeSwatch) {
                    currentColor = activeSwatch.dataset.color;
                }
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-paint').classList.add('active');
                paintCanvas.style.cursor = 'crosshair';
            });
            
            document.getElementById('tool-erase').addEventListener('click', () => {
                currentTool = 'erase';
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tool-erase').classList.add('active');
                paintCanvas.style.cursor = 'crosshair';
            });
            
            document.querySelectorAll('.color-swatch').forEach(swatch => {
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    
                    currentColor = swatch.dataset.color;
                    document.getElementById('current-color').innerHTML = currentColor;
                    
                    if (currentTool === 'erase') {
                        currentTool = 'paint';
                        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                        document.getElementById('tool-paint').classList.add('active');
                    }
                });
            });
            
            const brushInput = document.getElementById('brush-size');
            const brushValue = document.getElementById('brush-value');
            brushInput.addEventListener('input', () => {
                brushSize = parseInt(brushInput.value);
                brushValue.innerHTML = brushSize + 'px';
            });
            
            const snapInput = document.getElementById('snap-strength');
            const snapValue = document.getElementById('snap-value');
            snapInput.addEventListener('input', () => {
                snapStrength = parseFloat(snapInput.value);
                snapValue.innerHTML = snapStrength.toFixed(2);
            });
            
            document.getElementById('clear-btn').addEventListener('click', () => {
                strokes = [];
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                document.getElementById('stroke-count').innerHTML = '0';
            });
            
            window.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    e.preventDefault();
                    document.getElementById('tool-pan').click();
                } else if (e.key === 'p') {
                    document.getElementById('tool-paint').click();
                } else if (e.key === 'e') {
                    document.getElementById('tool-erase').click();
                } else if (e.key === 'r') {
                    cameraWorldX = 0;
                    cameraWorldY = 0;
                    scale = 1.0;
                    drawGrid();
                    redrawAllStrokes();
                }
            });
            
            // Resize both canvases
            function resizeCanvases() {
                gridCanvas.width = window.innerWidth;
                gridCanvas.height = window.innerHeight;
                paintCanvas.width = window.innerWidth;
                paintCanvas.height = window.innerHeight;
                drawGrid();
                redrawAllStrokes();
            }
            
            window.addEventListener('resize', resizeCanvases);
            
            // Initialize
            resizeCanvases();
            
            // FPS counter
            let frameCount = 0;
            let lastTime = performance.now();
            
            function updateFPS() {
                frameCount++;
                const now = performance.now();
                if (now - lastTime >= 1000) {
                    document.getElementById('fps').innerHTML = frameCount;
                    frameCount = 0;
                    lastTime = now;
                }
                requestAnimationFrame(updateFPS);
            }
            
            updateFPS();
        })();
    </script>
</body>
</html>
