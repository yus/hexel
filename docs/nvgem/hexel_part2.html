<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FLUID PAINT · DIFFUSION · PAPER-LIKE GRID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        /* Canvas layers */
        #gridCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            z-index: 1;
            pointer-events: none;
        }
        
        #paintCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            background: transparent;
            cursor: crosshair;
            touch-action: none;
        }
        
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c4b5fd40;
            padding: 16px 20px;
            color: #e0e0ff;
            font-family: monospace;
            font-size: 13px;
            min-width: 320px;
            z-index: 100;
            pointer-events: none;
        }
        
        .panel-title {
            color: #c4b5fd;
            font-size: 14px;
            margin-bottom: 12px;
            border-bottom: 1px solid #c4b5fd30;
            padding-bottom: 6px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 9px;
            text-transform: uppercase;
        }
        
        .stat-value {
            color: #ffd966;
            font-size: 13px;
        }
        
        .tool-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #c4b5fd40;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }
        
        .tool-btn {
            background: transparent;
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            min-width: 60px;
        }
        
        .tool-btn:hover {
            background: #c4b5fd20;
        }
        
        .tool-btn.active {
            background: #c4b5fd;
            color: #0a0a0a;
        }
        
        .slider-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .slider-control input {
            width: 100px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #c4b5fd40;
            color: white;
            padding: 4px;
        }
        
        .coord-display {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #c4b5fd40;
            color: #c4b5fd;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
        }
        
        * {
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>
    <canvas id="paintCanvas"></canvas>
    
    <div id="panel">
        <div class="panel-title">⚡ FLUID PAINT · DIFFUSION · PAPER GRID</div>
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">Paint Points</span>
                <span class="stat-value" id="point-count">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Diffusion</span>
                <span class="stat-value" id="diffusion-value">0.02</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Flow</span>
                <span class="stat-value" id="flow-value">0.5</span>
            </div>
        </div>
        <div style="font-size:11px; color:#aaa; margin-top:4px;">
            ⚫ Paint | ✥ Right-drag pan | 🔍 Scroll zoom
        </div>
    </div>
    
    <div class="tool-panel">
        <button class="tool-btn active" id="btn-paint">● Paint</button>
        <button class="tool-btn" id="btn-erase">⌫ Erase</button>
        <button class="tool-btn" id="btn-clear">Clear</button>
        
        <div class="slider-control">
            <span style="color:#c4b5fd;">💧</span>
            <input type="range" id="diffusion-slider" min="0" max="0.1" step="0.002" value="0.02">
            <span id="diffusion-display">0.02</span>
        </div>
        
        <div class="slider-control">
            <span style="color:#c4b5fd;">🌊</span>
            <input type="range" id="flow-slider" min="0" max="1" step="0.05" value="0.5">
            <span id="flow-display">0.5</span>
        </div>
    </div>
    
    <div class="coord-display" id="coords">0.00 , 0.00</div>

    <script>
        (function() {
            // Canvas setup
            const gridCanvas = document.getElementById('gridCanvas');
            const paintCanvas = document.getElementById('paintCanvas');
            
            const gridCtx = gridCanvas.getContext('2d');
            const paintCtx = paintCanvas.getContext('2d');
            
            // Grid parameters
            const BASE_SIZE = 24;
            const H_STEP = BASE_SIZE * 2;
            const V_STEP = BASE_SIZE * Math.sqrt(3);
            
            // Camera
            let cameraX = 0, cameraY = 0, scale = 1.0;
            
            // Interaction
            let isPainting = false;
            let isPanning = false;
            let currentTool = 'paint';
            let lastX, lastY;
            
            // Paint state - now using a grid-based representation for diffusion
            const GRID_SIZE = 128; // 128x128 simulation grid
            const CELL_SIZE = 10; // pixels per cell at zoom=1
            
            // Paint field - stores density at each grid cell
            let paintField = new Float32Array(GRID_SIZE * GRID_SIZE * 3); // RGB channels
            let tempField = new Float32Array(GRID_SIZE * GRID_SIZE * 3);
            
            // Parameters
            let diffusionRate = 0.02;
            let flowStrength = 0.5;
            let time = 0;
            
            // Colors
            const COLORS = [
                [1.0, 0.4, 0.4], // red
                [0.4, 1.0, 0.4], // green
                [0.4, 0.4, 1.0], // blue
                [1.0, 1.0, 0.4], // yellow
                [0.8, 0.4, 1.0]  // purple
            ];
            let currentColor = COLORS[3]; // Start with purple
            
            // ================================================
            // GRID VELOCITY FIELD (affects paint flow)
            // ================================================
            function getGridVelocity(worldX, worldY, t) {
                // Get grid cell coordinates
                const col = Math.floor(worldX / H_STEP);
                const row = Math.floor(worldY / V_STEP);
                const inOddRow = (row % 2 !== 0);
                
                // Local position within cell
                const localX = (worldX - col * H_STEP) / H_STEP;
                const localY = (worldY - row * V_STEP) / V_STEP;
                
                // Create flow that follows the triangular grid
                // This makes paint naturally move along the grid lines
                const baseSpeed = flowStrength * 2.0;
                
                // Flow along three grid directions
                let vx = 0, vy = 0;
                
                // Horizontal flow (alternating direction)
                vx += Math.sin(localY * Math.PI * 2 + t) * baseSpeed;
                
                // Diagonal flow (+60°)
                vx += Math.cos(localX * Math.PI * 2 + t * 0.7) * baseSpeed * 0.5;
                vy += Math.sin(localX * Math.PI * 2 + t * 0.7) * baseSpeed * 0.5;
                
                // Diagonal flow (-60°)
                vx += Math.sin(localY * Math.PI * 2 + t * 1.3) * baseSpeed * 0.3;
                vy -= Math.cos(localY * Math.PI * 2 + t * 1.3) * baseSpeed * 0.3;
                
                return { x: vx, y: vy };
            }
            
            // ================================================
            // DIFFUSION (Jacobi iteration)
            // ================================================
            function diffuse(dt) {
                const alpha = dt * diffusionRate * GRID_SIZE * GRID_SIZE;
                const beta = 1 / (1 + 4 * alpha);
                
                // Jacobi iteration (4 iterations is enough for smooth diffusion)
                for (let iter = 0; iter < 4; iter++) {
                    for (let y = 1; y < GRID_SIZE - 1; y++) {
                        for (let x = 1; x < GRID_SIZE - 1; x++) {
                            const idx = (y * GRID_SIZE + x) * 3;
                            
                            // Get neighbors
                            const leftIdx = idx - 3;
                            const rightIdx = idx + 3;
                            const topIdx = idx - GRID_SIZE * 3;
                            const bottomIdx = idx + GRID_SIZE * 3;
                            
                            // Apply diffusion for each color channel
                            for (let c = 0; c < 3; c++) {
                                const neighbors = 
                                    paintField[leftIdx + c] +
                                    paintField[rightIdx + c] +
                                    paintField[topIdx + c] +
                                    paintField[bottomIdx + c];
                                
                                tempField[idx + c] = (paintField[idx + c] + alpha * neighbors) * beta;
                            }
                        }
                    }
                    
                    // Swap buffers
                    [paintField, tempField] = [tempField, paintField];
                }
            }
            
            // ================================================
            // ADVECTION (semi-Lagrangian)
            // ================================================
            function advect(dt) {
                // Clear temp field
                tempField.fill(0);
                
                // For each cell, trace backwards to find where paint comes from
                for (let y = 1; y < GRID_SIZE - 1; y++) {
                    for (let x = 1; x < GRID_SIZE - 1; x++) {
                        // Convert grid cell to world position
                        const worldX = (x - GRID_SIZE/2) * CELL_SIZE + cameraX;
                        const worldY = (y - GRID_SIZE/2) * CELL_SIZE + cameraY;
                        
                        // Get velocity at this position
                        const vel = getGridVelocity(worldX, worldY, time);
                        
                        // Trace backwards
                        const prevWorldX = worldX - vel.x * dt * CELL_SIZE * 10;
                        const prevWorldY = worldY - vel.y * dt * CELL_SIZE * 10;
                        
                        // Convert back to grid coordinates
                        const prevX = Math.floor((prevWorldX - cameraX) / CELL_SIZE + GRID_SIZE/2);
                        const prevY = Math.floor((prevWorldY - cameraY) / CELL_SIZE + GRID_SIZE/2);
                        
                        // Bilinear interpolation of source
                        if (prevX >= 0 && prevX < GRID_SIZE - 1 && prevY >= 0 && prevY < GRID_SIZE - 1) {
                            const fx = prevX - Math.floor(prevX);
                            const fy = prevY - Math.floor(prevY);
                            
                            const idx00 = (Math.floor(prevY) * GRID_SIZE + Math.floor(prevX)) * 3;
                            const idx10 = idx00 + 3;
                            const idx01 = idx00 + GRID_SIZE * 3;
                            const idx11 = idx01 + 3;
                            
                            const targetIdx = (y * GRID_SIZE + x) * 3;
                            
                            for (let c = 0; c < 3; c++) {
                                const v00 = paintField[idx00 + c];
                                const v10 = paintField[idx10 + c];
                                const v01 = paintField[idx01 + c];
                                const v11 = paintField[idx11 + c];
                                
                                // Bilinear interpolation
                                const v0 = v00 * (1 - fx) + v10 * fx;
                                const v1 = v01 * (1 - fx) + v11 * fx;
                                tempField[targetIdx + c] = v0 * (1 - fy) + v1 * fy;
                            }
                        }
                    }
                }
                
                // Swap buffers
                [paintField, tempField] = [tempField, paintField];
            }
            
            // ================================================
            // PAINTING (add density)
            // ================================================
            function addPaint(screenX, screenY) {
                // Convert screen to world
                const worldX = cameraX + (screenX - paintCanvas.width/2) / scale;
                const worldY = cameraY + (screenY - paintCanvas.height/2) / scale;
                
                // Convert world to grid cell
                const gridX = Math.floor((worldX - cameraX) / CELL_SIZE + GRID_SIZE/2);
                const gridY = Math.floor((worldY - cameraY) / CELL_SIZE + GRID_SIZE/2);
                
                // Add paint to this cell and neighbors
                const radius = 2;
                for (let dy = -radius; dy <= radius; dy++) {
                    for (let dx = -radius; dx <= radius; dx++) {
                        const nx = gridX + dx;
                        const ny = gridY + dy;
                        
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist <= radius) {
                                const idx = (ny * GRID_SIZE + nx) * 3;
                                const strength = 0.3 * (1 - dist/radius);
                                
                                if (currentTool === 'paint') {
                                    paintField[idx] = Math.min(1, paintField[idx] + currentColor[0] * strength);
                                    paintField[idx+1] = Math.min(1, paintField[idx+1] + currentColor[1] * strength);
                                    paintField[idx+2] = Math.min(1, paintField[idx+2] + currentColor[2] * strength);
                                } else {
                                    // Erase
                                    paintField[idx] = Math.max(0, paintField[idx] - strength);
                                    paintField[idx+1] = Math.max(0, paintField[idx+1] - strength);
                                    paintField[idx+2] = Math.max(0, paintField[idx+2] - strength);
                                }
                            }
                        }
                    }
                }
            }
            
            // ================================================
            // RENDERING
            // ================================================
            function drawGrid() {
                gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
                
                const centerX = gridCanvas.width / 2;
                const centerY = gridCanvas.height / 2;
                
                const worldLeft = cameraX - (gridCanvas.width / 2) / scale;
                const worldRight = cameraX + (gridCanvas.width / 2) / scale;
                const worldTop = cameraY - (gridCanvas.height / 2) / scale;
                const worldBottom = cameraY + (gridCanvas.height / 2) / scale;
                
                const minCol = Math.floor(worldLeft / H_STEP) - 2;
                const maxCol = Math.ceil(worldRight / H_STEP) + 2;
                const minRow = Math.floor(worldTop / V_STEP) - 2;
                const maxRow = Math.ceil(worldBottom / V_STEP) + 2;
                
                gridCtx.strokeStyle = '#c4b5fd';
                gridCtx.lineWidth = 0.5;
                gridCtx.globalAlpha = 0.15;
                
                // Draw triangular grid
                for (let row = minRow; row <= maxRow; row++) {
                    for (let col = minCol; col <= maxCol; col++) {
                        const x = centerX + (col * H_STEP - cameraX) * scale;
                        const y = centerY + (row * V_STEP - cameraY) * scale;
                        const xOffset = (row % 2 === 0) ? 0 : (H_STEP * scale) / 2;
                        
                        // Draw grid lines
                        gridCtx.beginPath();
                        gridCtx.moveTo(x + xOffset - 10, y - 17.32);
                        gridCtx.lineTo(x + xOffset + 10, y + 17.32);
                        gridCtx.stroke();
                        
                        gridCtx.beginPath();
                        gridCtx.moveTo(x + xOffset - 10, y + 17.32);
                        gridCtx.lineTo(x + xOffset + 10, y - 17.32);
                        gridCtx.stroke();
                    }
                }
            }
            
            function drawPaint() {
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                
                const centerX = paintCanvas.width / 2;
                const centerY = paintCanvas.height / 2;
                
                // Draw each grid cell as a small square
                const cellSizeScreen = CELL_SIZE * scale;
                
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const idx = (y * GRID_SIZE + x) * 3;
                        const r = paintField[idx];
                        const g = paintField[idx + 1];
                        const b = paintField[idx + 2];
                        
                        if (r + g + b < 0.01) continue;
                        
                        // Convert grid to screen
                        const worldX = cameraX + (x - GRID_SIZE/2) * CELL_SIZE;
                        const worldY = cameraY + (y - GRID_SIZE/2) * CELL_SIZE;
                        
                        const screenX = centerX + (worldX - cameraX) * scale;
                        const screenY = centerY + (worldY - cameraY) * scale;
                        
                        paintCtx.fillStyle = `rgba(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)}, ${Math.min(r+g+b, 0.8)})`;
                        paintCtx.fillRect(screenX - cellSizeScreen/2, screenY - cellSizeScreen/2, cellSizeScreen, cellSizeScreen);
                    }
                }
            }
            
            // ================================================
            // ANIMATION LOOP
            // ================================================
            function update() {
                time += 0.02;
                
                // Apply physics
                diffuse(0.1);
                advect(0.1);
                
                // Update UI
                document.getElementById('point-count').innerHTML = 
                    paintField.reduce((sum, val) => sum + (val > 0.01 ? 1 : 0), 0);
                
                // Render
                drawGrid();
                drawPaint();
                
                requestAnimationFrame(update);
            }
            
            // ================================================
            // INTERACTION (FIXED PAN)
            // ================================================
            paintCanvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                
                const rect = paintCanvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (e.button === 2) { // Right button = pan
                    isPanning = true;
                    paintCanvas.style.cursor = 'grabbing';
                } else { // Left button = paint
                    isPainting = true;
                    addPaint(x, y);
                }
                
                lastX = x;
                lastY = y;
            });
            
            paintCanvas.addEventListener('mousemove', (e) => {
                e.preventDefault();
                
                const rect = paintCanvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Update coordinates display
                const world = {
                    x: cameraX + (x - paintCanvas.width/2) / scale,
                    y: cameraY + (y - paintCanvas.height/2) / scale
                };
                document.getElementById('coords').innerHTML = `${world.x.toFixed(2)} , ${world.y.toFixed(2)}`;
                
                if (isPanning) {
                    // Pan camera
                    cameraX -= (x - lastX) / scale;
                    cameraY -= (y - lastY) / scale;
                } else if (isPainting) {
                    // Paint along the path
                    const dist = Math.hypot(x - lastX, y - lastY);
                    const steps = Math.max(1, Math.floor(dist / 5));
                    
                    for (let i = 0; i <= steps; i++) {
                        const t = i / steps;
                        const ix = lastX * (1 - t) + x * t;
                        const iy = lastY * (1 - t) + y * t;
                        addPaint(ix, iy);
                    }
                }
                
                lastX = x;
                lastY = y;
            });
            
            paintCanvas.addEventListener('mouseup', () => {
                isPainting = false;
                isPanning = false;
                paintCanvas.style.cursor = 'crosshair';
            });
            
            paintCanvas.addEventListener('mouseleave', () => {
                isPainting = false;
                isPanning = false;
                paintCanvas.style.cursor = 'crosshair';
            });
            
            paintCanvas.addEventListener('contextmenu', (e) => e.preventDefault());
            
            // Zoom with wheel
            paintCanvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                const rect = paintCanvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const worldBefore = {
                    x: cameraX + (mouseX - paintCanvas.width/2) / scale,
                    y: cameraY + (mouseY - paintCanvas.height/2) / scale
                };
                
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= zoomFactor;
                scale = Math.max(0.1, Math.min(10, scale));
                
                const worldAfter = {
                    x: cameraX + (mouseX - paintCanvas.width/2) / scale,
                    y: cameraY + (mouseY - paintCanvas.height/2) / scale
                };
                
                cameraX += worldBefore.x - worldAfter.x;
                cameraY += worldBefore.y - worldAfter.y;
            }, { passive: false });
            
            // ================================================
            // UI CONTROLS
            // ================================================
            document.getElementById('btn-paint').addEventListener('click', () => {
                currentTool = 'paint';
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-paint').classList.add('active');
            });
            
            document.getElementById('btn-erase').addEventListener('click', () => {
                currentTool = 'erase';
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-erase').classList.add('active');
            });
            
            document.getElementById('btn-clear').addEventListener('click', () => {
                paintField.fill(0);
            });
            
            const diffusionSlider = document.getElementById('diffusion-slider');
            diffusionSlider.addEventListener('input', () => {
                diffusionRate = parseFloat(diffusionSlider.value);
                document.getElementById('diffusion-display').innerHTML = diffusionRate.toFixed(3);
                document.getElementById('diffusion-value').innerHTML = diffusionRate.toFixed(3);
            });
            
            const flowSlider = document.getElementById('flow-slider');
            flowSlider.addEventListener('input', () => {
                flowStrength = parseFloat(flowSlider.value);
                document.getElementById('flow-display').innerHTML = flowStrength.toFixed(2);
                document.getElementById('flow-value').innerHTML = flowStrength.toFixed(2);
            });
            
            // Resize handler
            function resize() {
                gridCanvas.width = window.innerWidth;
                gridCanvas.height = window.innerHeight;
                paintCanvas.width = window.innerWidth;
                paintCanvas.height = window.innerHeight;
                drawGrid();
                drawPaint();
            }
            
            window.addEventListener('resize', resize);
            resize();
            
            // Start animation
            update();
            
            // Initialize with some paint to demonstrate diffusion
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    const x = Math.random() * paintCanvas.width;
                    const y = Math.random() * paintCanvas.height;
                    addPaint(x, y);
                }
            }, 500);
        })();
    </script>
</body>
</html>
