<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Barycentric Grid - Fixed</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #111;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ff00;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #00ff00;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,255,0,0.3);
        }
        canvas {
            display: block;
            background: #0a0a1a;
        }
        .error {
            color: #ff5555;
            background: rgba(0,0,0,0.9);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="info">
        <span style="color:#00ffff;">⚡ BARYCENTRIC GRID</span> | 6 triangles/hex | drag to pan | scroll to zoom
    </div>
    <div id="stats">
        FPS: <span id="fps-count">0</span> | 
        Tris: <span id="tri-count">0</span> | 
        Hex: <span id="hex-count">0</span>
    </div>

    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec2 a_position;
        attribute vec3 a_barycentric;
        attribute float a_hexId;
        
        uniform vec2 u_translation;
        uniform float u_scale;
        uniform vec2 u_resolution;
        
        varying vec3 v_barycentric;
        varying float v_hexId;
        varying vec2 v_position;
        
        void main() {
            vec2 pos = a_position * u_scale + u_translation;
            
            // Convert to clip space
            vec2 zeroToOne = pos / u_resolution;
            vec2 clipSpace = zeroToOne * 2.0 - 1.0;
            
            // Flip Y for WebGL
            gl_Position = vec4(clipSpace.x, -clipSpace.y, 0.0, 1.0);
            
            v_barycentric = a_barycentric;
            v_hexId = a_hexId;
            v_position = a_position;
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision highp float;
        
        varying vec3 v_barycentric;
        varying float v_hexId;
        varying vec2 v_position;
        
        uniform float u_time;
        uniform float u_gap;
        uniform float u_line;
        
        void main() {
            // Find minimum barycentric coordinate (distance to edge)
            float minDist = min(v_barycentric.x, min(v_barycentric.y, v_barycentric.z));
            
            // Grid lines
            float lineWidth = u_line * 0.15;
            float grid = 1.0 - smoothstep(0.0, lineWidth, minDist);
            
            // Generate vibrant colors based on barycentric coordinates
            vec3 color1 = vec3(1.0, 0.2, 0.2); // Red
            vec3 color2 = vec3(0.2, 1.0, 0.2); // Green  
            vec3 color3 = vec3(0.2, 0.2, 1.0); // Blue
            
            // Mix colors based on barycentric coordinates
            vec3 triangleColor = v_barycentric.x * color1 + 
                                v_barycentric.y * color2 + 
                                v_barycentric.z * color3;
            
            // Add variation based on hex ID
            float hexVar = fract(v_hexId * 0.618) * 0.3 + 0.7;
            triangleColor *= hexVar;
            
            // Apply gap effect
            float gapSize = u_gap * 2.0;
            float edgeMask = 1.0 - smoothstep(0.0, gapSize, minDist);
            triangleColor = mix(triangleColor, vec3(0.0), edgeMask * 0.5);
            
            // Mix grid lines
            vec3 finalColor = mix(triangleColor, vec3(0.9, 0.9, 1.0), grid);
            
            // Add subtle edge highlight
            if (minDist < 0.01) {
                finalColor = vec3(1.0);
            }
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        (function() {
            // ================================================
            // CONFIGURATION
            // ================================================
            const CONFIG = {
                HEX_SIZE: 1.5,
                GAP: 0.08,
                LINE_WIDTH: 0.9,
                VISIBLE_RADIUS: 15,  // Reduced for 16-bit index safety
            };
            
            // ================================================
            // WEBGL SETUP
            // ================================================
            let gl, canvas;
            let program;
            let vertexBuffer, indexBuffer;
            let translation = [400, 300];
            let scale = 25.0;
            let isDragging = false;
            let lastMousePos = [0, 0];
            
            // Performance monitoring
            let frameCount = 0;
            let lastTime = performance.now();
            let fps = 0;
            
            // Geometry data
            let vertexData = [];
            let indexData = [];
            let triangleCount = 0;
            let hexCount = 0;
            
            // ================================================
            // GEOMETRY GENERATION (16-bit indices safe)
            // ================================================
            
            function generateGrid() {
                console.log("Generating grid geometry...");
                vertexData = [];
                indexData = [];
                
                const radius = CONFIG.VISIBLE_RADIUS;
                hexCount = 0;
                
                // Pre-calculate hex centers
                for (let j = -radius; j <= radius; j++) {
                    for (let i = -radius; i <= radius; i++) {
                        const centerX = CONFIG.HEX_SIZE * (i + j/2);
                        const centerY = CONFIG.HEX_SIZE * (j * Math.sqrt(3)/2);
                        
                        // Generate 6 outer vertices
                        const outerVerts = [];
                        for (let k = 0; k < 6; k++) {
                            const angle = k * Math.PI / 3;
                            outerVerts.push({
                                x: centerX + CONFIG.HEX_SIZE * Math.cos(angle),
                                y: centerY + CONFIG.HEX_SIZE * Math.sin(angle)
                            });
                        }
                        
                        // Hex ID for color variation
                        const hexId = (i * 7 + j * 31) / 100.0;
                        
                        // Generate 6 triangles
                        for (let tri = 0; tri < 6; tri++) {
                            const next = (tri + 1) % 6;
                            
                            // Vertex 0: Center (equal barycentric)
                            vertexData.push(centerX, centerY);
                            vertexData.push(0.33, 0.33, 0.33);
                            vertexData.push(hexId);
                            
                            // Vertex 1: Outer vertex tri
                            vertexData.push(outerVerts[tri].x, outerVerts[tri].y);
                            vertexData.push(1.0, 0.0, 0.0);
                            vertexData.push(hexId);
                            
                            // Vertex 2: Outer vertex next
                            vertexData.push(outerVerts[next].x, outerVerts[next].y);
                            vertexData.push(0.0, 1.0, 0.0);
                            vertexData.push(hexId);
                            
                            // Add indices (using UNSIGNED_SHORT)
                            const baseIdx = (hexCount * 18) + (tri * 3);
                            indexData.push(baseIdx, baseIdx + 1, baseIdx + 2);
                        }
                        
                        hexCount++;
                    }
                }
                
                triangleCount = indexData.length;
                document.getElementById('tri-count').textContent = triangleCount.toLocaleString();
                document.getElementById('hex-count').textContent = hexCount;
                
                console.log(`Generated ${hexCount} hexagons (${triangleCount} triangles)`);
                console.log(`Vertices: ${vertexData.length / 6}`);
                
                // Verify 16-bit index safety
                if (hexCount * 18 > 65535) {
                    console.warn("Too many vertices for 16-bit indices!");
                }
            }
            
            // ================================================
            // WEBGL INIT
            // ================================================
            
            function initWebGL() {
                canvas = document.createElement('canvas');
                document.body.appendChild(canvas);
                
                // Request WebGL with explicit settings
                gl = canvas.getContext('webgl', {
                    antialias: true,
                    depth: false,
                    alpha: false,
                    preserveDrawingBuffer: false
                });
                
                if (!gl) {
                    document.body.innerHTML += '<div class="error">WebGL not supported</div>';
                    return;
                }
                
                // Log WebGL info
                console.log("WebGL Renderer:", gl.getParameter(gl.RENDERER));
                console.log("WebGL Version:", gl.getParameter(gl.VERSION));
                
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                // Compile shaders
                const vs = compileShader(gl.VERTEX_SHADER, 
                    document.getElementById('vertex-shader').text);
                const fs = compileShader(gl.FRAGMENT_SHADER, 
                    document.getElementById('fragment-shader').text);
                
                if (!vs || !fs) return;
                
                program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);
                
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error('Shader link failed:', gl.getProgramInfoLog(program));
                    return;
                }
                
                gl.useProgram(program);
                
                // Generate geometry
                generateGrid();
                
                // Setup buffers
                setupBuffers();
                
                // Get uniform locations
                program.u_translation = gl.getUniformLocation(program, 'u_translation');
                program.u_scale = gl.getUniformLocation(program, 'u_scale');
                program.u_resolution = gl.getUniformLocation(program, 'u_resolution');
                program.u_time = gl.getUniformLocation(program, 'u_time');
                program.u_gap = gl.getUniformLocation(program, 'u_gap');
                program.u_line = gl.getUniformLocation(program, 'u_line');
                
                // Set uniforms
                gl.uniform1f(program.u_gap, CONFIG.GAP);
                gl.uniform1f(program.u_line, CONFIG.LINE_WIDTH);
                
                // Setup events
                setupEvents();
                
                // Start render loop
                requestAnimationFrame(render);
            }
            
            function compileShader(type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                    console.error('Source:', source);
                    gl.deleteShader(shader);
                    return null;
                }
                
                return shader;
            }
            
            function setupBuffers() {
                // Vertex buffer
                vertexBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertexData), gl.STATIC_DRAW);
                
                // Index buffer - USING UNSIGNED_SHORT (16-bit)
                indexBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indexData), gl.STATIC_DRAW);
                
                // Setup attributes
                const stride = 6 * 4; // 6 floats * 4 bytes
                
                // a_position (location 0)
                gl.vertexAttribPointer(0, 2, gl.FLOAT, false, stride, 0);
                gl.enableVertexAttribArray(0);
                
                // a_barycentric (location 1)
                gl.vertexAttribPointer(1, 3, gl.FLOAT, false, stride, 2 * 4);
                gl.enableVertexAttribArray(1);
                
                // a_hexId (location 2)
                gl.vertexAttribPointer(2, 1, gl.FLOAT, false, stride, 5 * 4);
                gl.enableVertexAttribArray(2);
                
                // Check for errors
                const error = gl.getError();
                if (error !== gl.NO_ERROR) {
                    console.error("WebGL error:", error);
                }
            }
            
            // ================================================
            // RENDER LOOP
            // ================================================
            
            function render(time) {
                time *= 0.001;
                
                // FPS counter
                frameCount++;
                const now = performance.now();
                const delta = now - lastTime;
                
                if (delta >= 1000) {
                    fps = frameCount;
                    document.getElementById('fps-count').textContent = fps;
                    frameCount = 0;
                    lastTime = now;
                }
                
                // Resize if needed
                if (canvas.width !== canvas.clientWidth || 
                    canvas.height !== canvas.clientHeight) {
                    resizeCanvas();
                }
                
                // Clear with dark blue
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.clearColor(0.05, 0.05, 0.15, 1.0);
                gl.clear(gl.COLOR_BUFFER_BIT);
                
                // Update uniforms
                gl.uniform2f(program.u_translation, translation[0], translation[1]);
                gl.uniform1f(program.u_scale, scale);
                gl.uniform2f(program.u_resolution, canvas.width, canvas.height);
                gl.uniform1f(program.u_time, time);
                
                // Draw
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
                gl.drawElements(gl.TRIANGLES, indexData.length, gl.UNSIGNED_SHORT, 0);
                
                requestAnimationFrame(render);
            }
            
            // ================================================
            // INTERACTION
            // ================================================
            
            function setupEvents() {
                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    lastMousePos = [e.clientX, e.clientY];
                    canvas.style.cursor = 'grabbing';
                });
                
                window.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    
                    translation[0] += e.clientX - lastMousePos[0];
                    translation[1] += e.clientY - lastMousePos[1];
                    lastMousePos = [e.clientX, e.clientY];
                });
                
                window.addEventListener('mouseup', () => {
                    isDragging = false;
                    canvas.style.cursor = 'default';
                });
                
                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                    scale = Math.max(5, Math.min(100, scale * delta));
                }, { passive: false });
                
                // Touch support
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1) {
                        isDragging = true;
                        lastMousePos = [e.touches[0].clientX, e.touches[0].clientY];
                    }
                });
                
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (isDragging && e.touches.length === 1) {
                        translation[0] += e.touches[0].clientX - lastMousePos[0];
                        translation[1] += e.touches[0].clientY - lastMousePos[1];
                        lastMousePos = [e.touches[0].clientX, e.touches[0].clientY];
                    }
                });
                
                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    isDragging = false;
                });
            }
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                if (gl) {
                    gl.viewport(0, 0, canvas.width, canvas.height);
                }
            }
            
            // ================================================
            // START
            // ================================================
            
            window.onload = () => {
                try {
                    initWebGL();
                } catch (e) {
                    console.error("Init failed:", e);
                    document.body.innerHTML += `<div class="error">Error: ${e.message}</div>`;
                }
            };
        })();
    </script>
</body>
</html>
