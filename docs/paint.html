<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE.JS 24 · HEXEL PAINTER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1219; overflow: hidden; font-family: 'Inter', monospace; }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        
        #toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2430;
            border: 1px solid #3a4a60;
            border-radius: 2px;
            padding: 4px;
            display: flex;
            gap: 2px;
            z-index: 1000;
        }
        
        .tool-btn {
            background: transparent;
            border: none;
            color: #a0b5cc;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 2px;
            cursor: pointer;
        }
        
        .tool-btn.active {
            background: #2a4a68;
            color: white;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e2430;
            border: 1px solid #3a4a60;
            border-radius: 2px;
            padding: 6px 12px;
            color: #aac3d4;
            font-size: 12px;
            z-index: 800;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="tool-btn active" id="tool-paint">PAINT</button>
        <button class="tool-btn" id="tool-pan">PAN</button>
        <button class="tool-btn" id="reset">RESET</button>
    </div>
    <div id="status">⬡ Click to paint | Drag to pan</div>
    <canvas id="canvas"></canvas>

    <script>
        // WebGL setup
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        
        if (!gl) {
            alert('WebGL not supported');
        }

        // Set size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);

        // ============================================
        // SHADERS - Node.js 24 compatible (no non-constant indexing)
        // ============================================
        
        const vsSource = `
            attribute vec2 aPos;
            attribute vec3 aBary;
            attribute float aTriId;
            
            uniform vec2 uPan;
            uniform float uZoom;
            
            varying vec3 vBary;
            varying float vTriId;
            
            void main() {
                vec2 pos = (aPos + uPan) * uZoom;
                gl_Position = vec4(pos.x, pos.y, 0.0, 1.0);
                vBary = aBary;
                vTriId = aTriId;
            }
        `;

        // FIXED: Use texture instead of array for colors
        const fsSource = `
            precision highp float;
            
            varying vec3 vBary;
            varying float vTriId;
            
            uniform sampler2D uColorTex;
            uniform float uTexSize;
            
            void main() {
                // Get triangle ID
                float id = vTriId;
                
                // Convert to texture coordinates
                float tx = mod(id, uTexSize) / uTexSize;
                float ty = floor(id / uTexSize) / uTexSize;
                
                // Sample color from texture
                vec4 color = texture2D(uColorTex, vec2(tx, ty));
                
                // Grid lines
                float minDist = min(min(vBary.x, vBary.y), vBary.z);
                if (minDist < 0.03) {
                    color.rgb = vec3(0.9, 0.95, 1.0);
                }
                
                gl_FragColor = color;
            }
        `;

        // Compile shaders with error checking
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            }
            return shader;
        }

        const vs = compileShader(vsSource, gl.VERTEX_SHADER);
        const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
        
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);

        // ============================================
        // GENERATE EQUILATERAL GRID (60° angles)
        // ============================================
        
        const side = 0.3;
        const height = side * Math.sqrt(3) / 2;
        const gridSize = 20;
        
        const positions = [];
        const barycentrics = [];
        const triIds = [];
        const triangles = []; // For hit detection
        
        let triId = 0;

        function addTriangle(x1, y1, x2, y2, x3, y3) {
            // Store for hit detection
            triangles.push({
                id: triId,
                x1, y1, x2, y2, x3, y3,
                minX: Math.min(x1, x2, x3),
                maxX: Math.max(x1, x2, x3),
                minY: Math.min(y1, y2, y3),
                maxY: Math.max(y1, y2, y3)
            });
            
            // Add vertices
            positions.push(x1, y1, x2, y2, x3, y3);
            
            // Barycentric coordinates
            barycentrics.push(1,0,0, 0,1,0, 0,0,1);
            
            // Triangle IDs
            triIds.push(triId, triId, triId);
            
            triId++;
        }

        // Generate the grid
        for (let row = -gridSize; row < gridSize; row++) {
            for (let col = -gridSize; col < gridSize; col++) {
                const x = col * side;
                const y = row * height;
                const offset = (Math.abs(row) % 2) * (side / 2);
                
                // Up triangle
                addTriangle(
                    x + offset, y,
                    x + offset + side, y,
                    x + offset + side/2, y + height
                );
                
                // Down triangle
                addTriangle(
                    x + offset + side, y,
                    x + offset, y,
                    x + offset + side/2, y - height
                );
            }
        }

        console.log('Triangles:', triId);

        // ============================================
        // CREATE VERTEX BUFFER
        // ============================================
        
        const vertexData = [];
        for (let i = 0; i < positions.length; i += 2) {
            const vi = i / 2;
            vertexData.push(
                positions[i], positions[i+1],
                barycentrics[vi*3], barycentrics[vi*3+1], barycentrics[vi*3+2],
                triIds[vi]
            );
        }

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertexData), gl.STATIC_DRAW);

        // Get attribute locations
        const aPos = gl.getAttribLocation(program, 'aPos');
        const aBary = gl.getAttribLocation(program, 'aBary');
        const aTriId = gl.getAttribLocation(program, 'aTriId');

        // Check that attributes were found
        if (aPos === -1 || aBary === -1 || aTriId === -1) {
            console.error('Attribute locations not found');
        }

        const stride = 6 * 4; // 6 floats per vertex
        
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, stride, 0);
        
        gl.enableVertexAttribArray(aBary);
        gl.vertexAttribPointer(aBary, 3, gl.FLOAT, false, stride, 2*4);
        
        gl.enableVertexAttribArray(aTriId);
        gl.vertexAttribPointer(aTriId, 1, gl.FLOAT, false, stride, 5*4);

        // ============================================
        // CREATE COLOR TEXTURE (instead of array)
        // ============================================
        
        // Texture size must be power of two
        const texSize = Math.pow(2, Math.ceil(Math.log2(Math.ceil(Math.sqrt(triId)))));
        console.log('Texture size:', texSize);
        
        // Create texture data (RGBA bytes)
        const texData = new Uint8Array(texSize * texSize * 4);
        
        // Initialize with dark gray
        for (let i = 0; i < triId; i++) {
            const idx = i * 4;
            texData[idx] = 50;     // R
            texData[idx+1] = 55;    // G
            texData[idx+2] = 65;    // B
            texData[idx+3] = 255;   // A
        }

        // Create and configure texture
        const colorTex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, colorTex);
        
        // Set texture parameters
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        
        // Upload texture data
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, texData);

        // Get uniform locations
        const uPan = gl.getUniformLocation(program, 'uPan');
        const uZoom = gl.getUniformLocation(program, 'uZoom');
        const uColorTex = gl.getUniformLocation(program, 'uColorTex');
        const uTexSize = gl.getUniformLocation(program, 'uTexSize');

        // Set uniforms
        gl.uniform2f(uPan, 0, 0);
        gl.uniform1f(uZoom, 0.7);
        gl.uniform1i(uColorTex, 0); // Texture unit 0
        gl.uniform1f(uTexSize, texSize);

        // Function to update texture when painting
        function updateTexture() {
            gl.bindTexture(gl.TEXTURE_2D, colorTex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, texData);
        }

        // ============================================
        // MOUSE INTERACTION
        // ============================================
        
        let panX = 0, panY = 0;
        let zoom = 0.7;
        let isDragging = false;
        let lastX, lastY;
        let currentTool = 'paint';

        // Screen to world conversion
        function screenToWorld(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            
            // Convert to normalized device coordinates [-1, 1]
            const ndcX = (screenX / rect.width) * 2 - 1;
            const ndcY = 1 - (screenY / rect.height) * 2;
            
            // Reverse transform
            const worldX = ndcX / zoom - panX;
            const worldY = ndcY / zoom - panY;
            
            return { x: worldX, y: worldY };
        }

        // Point in triangle test (barycentric)
        function pointInTriangle(px, py, x1, y1, x2, y2, x3, y3) {
            const v0x = x3 - x1;
            const v0y = y3 - y1;
            const v1x = x2 - x1;
            const v1y = y2 - y1;
            const v2x = px - x1;
            const v2y = py - y1;
            
            const dot00 = v0x * v0x + v0y * v0y;
            const dot01 = v0x * v1x + v0y * v1y;
            const dot02 = v0x * v2x + v0y * v2y;
            const dot11 = v1x * v1x + v1y * v1y;
            const dot12 = v1x * v2x + v1y * v2y;
            
            const invDenom = 1 / (dot00 * dot11 - dot01 * dot01);
            const u = (dot11 * dot02 - dot01 * dot12) * invDenom;
            const v = (dot00 * dot12 - dot01 * dot02) * invDenom;
            
            return (u >= 0) && (v >= 0) && (u + v < 1);
        }

        // Find triangle at world coordinates
        function findTriangle(wx, wy) {
            for (const tri of triangles) {
                // Quick bounds check
                if (wx < tri.minX || wx > tri.maxX || wy < tri.minY || wy > tri.maxY) continue;
                
                if (pointInTriangle(wx, wy, tri.x1, tri.y1, tri.x2, tri.y2, tri.x3, tri.y3)) {
                    return tri.id;
                }
            }
            return -1;
        }

        // Paint triangle
        function paintTriangle(id) {
            if (id >= 0 && id < triId) {
                const idx = id * 4;
                texData[idx] = 74;     // R (0.29*255)
                texData[idx+1] = 168;   // G (0.66*255)
                texData[idx+2] = 255;   // B (1.0*255)
                updateTexture();
                return true;
            }
            return false;
        }

        // Mouse event handlers
        canvas.addEventListener('mousedown', (e) => {
            if (currentTool === 'pan') {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
            } else {
                const world = screenToWorld(e.clientX, e.clientY);
                const id = findTriangle(world.x, world.y);
                if (id >= 0) {
                    paintTriangle(id);
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = (e.clientX - lastX) * 0.005 / zoom;
                const dy = (e.clientY - lastY) * -0.005 / zoom;
                
                panX += dx;
                panY += dy;
                
                gl.uniform2f(uPan, panX, panY);
                
                lastX = e.clientX;
                lastY = e.clientY;
            } else if (currentTool === 'paint' && e.buttons === 1) {
                const world = screenToWorld(e.clientX, e.clientY);
                const id = findTriangle(world.x, world.y);
                if (id >= 0) {
                    paintTriangle(id);
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom *= e.deltaY > 0 ? 0.9 : 1.1;
            zoom = Math.max(0.2, Math.min(3.0, zoom));
            gl.uniform1f(uZoom, zoom);
        });

        // UI Controls
        document.getElementById('tool-paint').addEventListener('click', () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-paint').classList.add('active');
            currentTool = 'paint';
        });

        document.getElementById('tool-pan').addEventListener('click', () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-pan').classList.add('active');
            currentTool = 'pan';
        });

        document.getElementById('reset').addEventListener('click', () => {
            for (let i = 0; i < triId; i++) {
                const idx = i * 4;
                texData[idx] = 50;
                texData[idx+1] = 55;
                texData[idx+2] = 65;
            }
            updateTexture();
        });

        // Animation loop
        function animate() {
            gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
            requestAnimationFrame(animate);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
